[project]
name = "jutul-agent"
version = "0.0.0"
description = "Specialized scientific agent for AD-enabled simulators built on the Jutul framework."
readme = "README.md"
requires-python = ">=3.12"
authors = [
    {name = "Jakob Torben", email = "jakob.torben@sintef.no"},
]
license = "MIT"
classifiers = [
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "deepagents>=0.6.2",
    "mcp>=1.0",
    "python-dotenv>=1.0",
    # Provider packages. langchain-anthropic comes via deepagents; we add the
    # others explicitly so the default `openai:gpt-5.4-mini` works out of the
    # box and `provider:model` switching does not need code changes.
    "langchain-openai>=0.2",
    "langgraph-checkpoint-sqlite>=3.1.0",
    "markdown-it-py[linkify]>=4.0",
    "pygments>=2.17",
    "textual>=8.2.6",
]

[project.scripts]
jutul-agent = "jutul_agent.__main__:main"

[dependency-groups]
dev = [
    "pre-commit>=3.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.5",
    "syrupy>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jutul_agent"]

# Per-simulator folders carry julia_env/ templates and skills/ markdown that
# aren't picked up by the default Python-only wheel build; force-include them.
# julia/agentrepl_env ships the bare AgentREPL env used by the backend.
[tool.hatch.build.targets.wheel.force-include]
"src/jutul_agent/simulators" = "jutul_agent/simulators"
"src/jutul_agent/julia/agentrepl_env" = "jutul_agent/julia/agentrepl_env"
"src/jutul_agent/agent/julia_plot.jl" = "jutul_agent/agent/julia_plot.jl"

# Whitelist what ships in the source distribution. Keeps local development
# scratch directories at the repo root from ever leaking into a release.
[tool.hatch.build.targets.sdist]
include = [
    "src/jutul_agent",
    "tests",
    "docs",
    "pyproject.toml",
    "README.md",
    "AGENTS.md",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "RUF"]

[tool.ruff.format]
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --ignore=tests/live"
asyncio_mode = "auto"
markers = [
    "integration: requires Julia and the AgentREPL.jl env template under src/jutul_agent/assets/julia-envs/agentrepl",
]
