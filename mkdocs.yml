site_name: jutul-agent
site_description: Scientific AI agent for AD-enabled simulators on the Jutul framework.
repo_url: https://github.com/SINTEF-agentlab/jutul-agent
repo_name: SINTEF-agentlab/jutul-agent
docs_dir: docs

theme:
  name: material
  icon:
    logo: material/sine-wave
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: README.md
  - Usage:
      - Installation and usage: usage.md
      - CLI reference: cli.md
      - Configuration: configuration.md
      - Models: models.md
      - Approval and safety: approval.md
  - How it works:
      - Architecture: architecture.md
      - The server interface: server-interface.md
      - Turns: turns.md
      - The Julia kernel: julia-kernel.md
      - Filesystem: filesystem.md
      - Memory: memory.md
      - Context handling: context.md
      - The trace database: trace.md
  - Extending the agent:
      - Building your application: extending-for-your-application.md
      - Adding a simulator: adding-a-simulator.md
      - Improving the agent: improving-the-agent.md
  - Evaluation:
      - How evaluation works: evaluation.md
      - Session review: review.md
  - Benchmark: benchmark.md
  - Development:
      - Development: development.md
      - Testing: testing.md
      - Agent-first development: agent-first.md
      - The lab: lab.md
