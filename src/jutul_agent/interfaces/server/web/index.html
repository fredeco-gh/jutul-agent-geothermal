<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jutul-agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="workspace" id="workspace">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <span class="brand"><span class="brand-mark"></span> jutul-agent</span>
        </div>
        <button class="sidebar-new" id="new-chat" title="Start a new chat">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" />
          </svg>
          New chat
        </button>
        <div class="sidebar-section">Chats</div>
        <div class="sidebar-list" id="history-list">
          <div class="history-empty">No past sessions yet.</div>
        </div>
      </aside>

      <div class="app">
        <header class="topbar">
          <button class="icon-btn sidebar-toggle" id="sidebar-toggle" title="Show or hide chats"
            aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" />
            </svg>
          </button>
          <span class="sim-chip" id="sim-label" title="This folder's simulator" hidden></span>
          <div class="meta" id="meta"></div>
          <div class="actions">
            <span class="warming" id="warming" hidden>warming up Julia…</span>
            <span class="usage" id="usage"></span>
            <button class="ghost views-btn" id="views-btn" hidden>
              <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
                <path d="M4 5h16v10H4zM2 19h20" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" />
              </svg>
              <span id="views-count">Views</span>
            </button>
          </div>
        </header>

        <main class="conversation" id="conversation">
          <div class="thread" id="thread">
            <div class="welcome" id="welcome">
              <h1>What would you like to explore?</h1>
              <p>Ask a question or describe a task. The agent runs the simulator,
                writes and runs Julia, and shows results here.</p>
            </div>
          </div>
        </main>

        <footer class="composer-wrap">
          <div class="composer">
            <button id="attach" class="attach" title="Attach a file" aria-label="Attach a file">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path d="M21 11.5l-8.5 8.5a5 5 0 01-7-7l8.5-8.5a3.3 3.3 0 014.7 4.7l-8.5 8.5a1.6 1.6 0 01-2.3-2.3l7.8-7.8"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
            <input id="file-input" type="file" hidden multiple />
            <textarea id="prompt" rows="1" placeholder="Message jutul-agent…"></textarea>
            <button id="send" class="send" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path d="M3 20.5l18-8.5L3 3.5l0 6.5l12 2l-12 2z" fill="currentColor" />
              </svg>
            </button>
          </div>
          <div class="hint" id="hint">Enter to send · Shift+Enter for a newline · / for commands</div>
        </footer>
      </div>

      <aside class="canvas" id="canvas" hidden>
        <div class="canvas-grip" id="canvas-grip" title="Drag to resize"></div>
        <div class="canvas-head">
          <div class="canvas-tabs" id="canvas-tabs"></div>
          <div class="canvas-actions">
            <button class="icon-btn" id="canvas-popout" title="Open in a new tab" aria-label="Open in a new tab">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path d="M14 4h6v6M20 4l-9 9M19 14v5a1 1 0 01-1 1H6a1 1 0 01-1-1V7a1 1 0 011-1h5"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
            <button class="icon-btn" id="canvas-close" title="Close panel" aria-label="Close panel">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div class="canvas-body" id="canvas-body"></div>
      </aside>
    </div>

    <script src="markdown.js"></script>
    <script src="app.js"></script>
    <!-- A host app's bridge script, if one is being served at this path; 404s
         harmlessly otherwise. See examples/geothermal-viz-app for one consumer. -->
    <script src="/host-extension.js" onerror="this.remove()"></script>
  </body>
</html>
