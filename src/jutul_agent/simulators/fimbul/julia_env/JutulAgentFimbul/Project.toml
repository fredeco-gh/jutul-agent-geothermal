name = "JutulAgentFimbul"
uuid = "46917057-ee61-4ce0-8807-c8cab0e0431f"
version = "0.1.0"

# Per-simulator warm-up package for jutul-agent (Fimbul, which reuses JutulDarcy's
# solver). Sibling of the shared JutulAgent package in this env. Loads the
# simulator, recompiles GLMakie's solver invalidations via @recompile_invalidations,
# and bakes the agent's simulate_reservoir + plot_cell_data paths via
# @compile_workload. Single source of truth for the Fimbul warm-up.

[deps]
Fimbul = "cac51d78-27de-4708-bd2b-bd13a82f652b"
GLMakie = "e9467ef8-e4e7-5192-8a1a-b1aee30e663a"
Jutul = "2b460a1a-8a2b-45b2-b125-b5c536396eb9"
JutulDarcy = "82210473-ab04-4dce-b31b-11573c4f8e0a"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"

[compat]
PrecompileTools = "1"
julia = "1.10"
