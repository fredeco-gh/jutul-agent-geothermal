name = "JutulAgentMocca"
uuid = "118bae70-9d54-4e00-8665-eefd5efc28fa"
version = "0.1.0"

# Per-simulator warm-up package for jutul-agent (Mocca). Sibling of the shared
# JutulAgent package in this env. Loads the simulator, recompiles GLMakie's solver
# invalidations via @recompile_invalidations, and bakes the agent's simulate_process
# + plot_outlet paths via @compile_workload. Single source of truth for the Mocca
# warm-up.

[deps]
GLMakie = "e9467ef8-e4e7-5192-8a1a-b1aee30e663a"
Jutul = "2b460a1a-8a2b-45b2-b125-b5c536396eb9"
Mocca = "eb14e3ba-90c8-11ed-0ecf-1dd2ea0d109c"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"

[compat]
PrecompileTools = "1"
julia = "1.10"
