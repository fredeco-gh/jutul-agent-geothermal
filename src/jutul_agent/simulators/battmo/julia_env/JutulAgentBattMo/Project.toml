name = "JutulAgentBattMo"
uuid = "f9f14f6a-5be2-4b55-b75d-847ac964f0ff"
version = "0.1.0"

# Per-simulator warm-up package for jutul-agent (BattMo). Sibling of the shared
# JutulAgent package in this env. Loads the simulator, recompiles GLMakie's solver
# invalidations via @recompile_invalidations, and bakes the agent's solve path via
# @compile_workload. Single source of truth for the BattMo warm-up.

[deps]
BattMo = "6f0c0536-3c2c-4762-a987-c605a8a6f898"
GLMakie = "e9467ef8-e4e7-5192-8a1a-b1aee30e663a"
Jutul = "2b460a1a-8a2b-45b2-b125-b5c536396eb9"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"

[compat]
PrecompileTools = "1"
julia = "1.10"
