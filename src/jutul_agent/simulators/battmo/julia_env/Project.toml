[deps]
BattMo = "6f0c0536-3c2c-4762-a987-c605a8a6f898"
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
CSV = "336ed68f-0bac-5ca0-87d4-7b16caf5d00b"
DataFrames = "a93c6f00-e57d-5684-b7b6-d8193f3e46c0"
GLMakie = "e9467ef8-e4e7-5192-8a1a-b1aee30e663a"
GraphMakie = "1ecd5474-83a3-4783-bb4f-06765db800d2"
Interpolations = "a98d9a8b-a2ab-59e6-89dd-64a1c18fca59"
LayeredLayouts = "f4a74d36-062a-4d48-97cd-1356bad1de4e"
NetworkLayout = "46757867-2c16-5918-afeb-47bfcb05e46a"
Jutul = "2b460a1a-8a2b-45b2-b125-b5c536396eb9"
JutulAgent = "79b12aa6-73c9-4fa8-9c54-e97745f42687"
JutulAgentBattMo = "f9f14f6a-5be2-4b55-b75d-847ac964f0ff"

# Floor at the release the skills are written against, so a stale env can't drift
# behind them (it fails to resolve and the drift check prompts a rebuild). Bump it
# when the skills are updated for a newer BattMo.
[compat]
BattMo = "0.2.8"

# Both deps are jutul-agent's in-env Julia runtime, declared as relative `[sources]`
# paths so they survive the copy into a workspace. JutulAgent is the shared,
# sim-agnostic core (figure capture, ensemble helpers, generic-Makie warm-up) — it
# has a single source in the repo (src/jutul_agent/julia_runtime/JutulAgent) that
# env_setup copies in at bootstrap. JutulAgentBattMo is this env's per-simulator
# warm-up package (the solve bake + @recompile_invalidations).
[sources]
JutulAgent = {path = "JutulAgent"}
JutulAgentBattMo = {path = "JutulAgentBattMo"}
