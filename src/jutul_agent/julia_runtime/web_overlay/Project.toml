# Web-plotting overlay environment.
#
# Stacked on top of a workspace's simulator env (via JULIA_LOAD_PATH) only for the
# web interface, so WGLMakie and Bonito are never loaded or precompiled for the
# TUI/CLI. WGLMakie pulls the same Makie the base env already has (CairoMakie /
# GLMakie), so the two stacked envs share one Makie; the plot tool guards that
# invariant at load time. Kept to the two packages web interactivity needs.
[deps]
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
WGLMakie = "276b4fcb-3e11-5398-bf8b-a0c2d153d008"
