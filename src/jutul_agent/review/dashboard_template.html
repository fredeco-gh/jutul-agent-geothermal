<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jutul-agent — session review</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --line:#272c36; --fg:#e6e8ee; --mut:#9aa3b2;
    --hi:#ff6b6b; --med:#f0b429; --lo:#5c98ff; --ok:#3fbf7f; --accent:#7c9cff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:20px 28px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:18px; font-weight:650; }
  .sub { color:var(--mut); margin-top:4px; }
  main { padding:20px 28px; max-width:1200px; margin:0 auto; }
  .cards { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:8px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; min-width:120px; }
  .card .n { font-size:24px; font-weight:680; }
  .card .l { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .bars { display:flex; flex-wrap:wrap; gap:18px; margin:14px 0 4px; }
  .bargroup { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 16px; flex:1; min-width:240px; }
  .bargroup h3 { margin:0 0 10px; font-size:12px; color:var(--mut); text-transform:uppercase;
    letter-spacing:.04em; }
  .bar { display:flex; align-items:center; gap:8px; margin:5px 0; cursor:pointer; }
  .bar .name { width:130px; color:var(--mut); font-size:12px; }
  .bar .track { flex:1; height:10px; background:#11141a; border-radius:6px; overflow:hidden; }
  .bar .fill { height:100%; background:var(--accent); }
  .bar .c { width:28px; text-align:right; font-variant-numeric:tabular-nums; }
  nav.tabs { display:flex; gap:6px; margin:18px 0 12px; }
  nav.tabs button { background:transparent; border:1px solid var(--line); color:var(--mut);
    padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
  nav.tabs button.on { color:var(--fg); border-color:var(--accent); background:#1b2030; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; align-items:center; }
  .toolbar input, .toolbar select { background:var(--panel); border:1px solid var(--line);
    color:var(--fg); padding:7px 10px; border-radius:8px; font-size:13px; }
  .toolbar input[type=search] { flex:1; min-width:180px; }
  .toolbar .chk { color:var(--mut); font-size:13px; display:flex; align-items:center; gap:5px; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line);
    vertical-align:top; }
  th { color:var(--mut); font-weight:600; font-size:12px; text-transform:uppercase;
    letter-spacing:.03em; cursor:pointer; user-select:none; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:#1b2030; }
  .pill { display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px;
    border:1px solid var(--line); white-space:nowrap; }
  .sev-high { color:var(--hi); border-color:var(--hi); }
  .sev-medium { color:var(--med); border-color:var(--med); }
  .sev-low { color:var(--lo); border-color:var(--lo); }
  .status-fixed { color:var(--ok); border-color:var(--ok); }
  .status-dismissed { color:var(--mut); }
  .mut { color:var(--mut); }
  .tnum { font-variant-numeric:tabular-nums; }
  a { color:var(--accent); }
  dialog { background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:12px; max-width:760px; width:92%; padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .dlg-h { padding:16px 20px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .dlg-b { padding:16px 20px; max-height:64vh; overflow:auto; }
  .dlg-b h4 { margin:16px 0 6px; font-size:12px; text-transform:uppercase; color:var(--mut);
    letter-spacing:.04em; }
  .dlg-b ul { margin:6px 0; padding-left:18px; }
  .dlg-b li { margin:4px 0; }
  .ev { background:#11141a; border:1px solid var(--line); border-radius:8px;
    padding:8px 10px; white-space:pre-wrap; font:12px/1.5 ui-monospace,Menlo,Consolas,monospace; }
  .x { background:transparent; border:1px solid var(--line); color:var(--mut);
    border-radius:8px; padding:4px 10px; cursor:pointer; }
  .empty { color:var(--mut); padding:24px 0; }
  .finding { border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin:8px 0; }
  .finding .ft { font-weight:600; }
  .pill.stale { color:var(--med); border-color:var(--med); }
  .pill.eval-pass { color:var(--ok); border-color:var(--ok); }
  .pill.eval-fail { color:var(--hi); border-color:var(--hi); }
  .cmd { background:#11141a; border:1px solid var(--line); border-radius:8px;
    padding:8px 10px; margin:6px 0; }
  .cmd-h { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .cmd-l { color:var(--mut); font-size:12px; }
  .cmd code { display:block; margin-top:6px; color:var(--accent);
    font:12px/1.5 ui-monospace,Menlo,Consolas,monospace; word-break:break-all; }
</style>
</head>
<body>
<header>
  <h1>jutul-agent · session review</h1>
  <div class="sub" id="coverage"></div>
</header>
<main>
  <div class="cards" id="cards"></div>
  <div class="bars" id="breakdowns"></div>
  <nav class="tabs">
    <button data-tab="issues" class="on">Issues</button>
    <button data-tab="reviews">Reviews</button>
  </nav>
  <div id="issues-view">
    <div class="toolbar">
      <input type="search" id="q" placeholder="Search issues…">
      <select id="f-fix"><option value="">all fix targets</option></select>
      <select id="f-cat"><option value="">all categories</option></select>
      <select id="f-sev"><option value="">all severities</option></select>
      <select id="f-status">
        <option value="open">open</option>
        <option value="">all statuses</option>
        <option value="fixed">fixed</option>
        <option value="dismissed">dismissed</option>
      </select>
      <label class="chk"><input type="checkbox" id="f-stale"> possibly fixed only</label>
      <label class="chk">last session ≥ <input type="date" id="f-from"></label>
      <label class="chk">≤ <input type="date" id="f-to"></label>
    </div>
    <table id="issues-table">
      <thead><tr>
        <th data-k="priority">Pri</th><th data-k="severity">Sev</th><th data-k="title">Issue</th>
        <th data-k="count">Seen</th><th data-k="nsess">Sessions</th>
        <th data-k="category">Category</th><th data-k="fix_target">Fix</th>
        <th data-k="status">Status</th><th data-k="last_session">Last session</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="issues-empty" hidden>No issues match.</div>
  </div>
  <div id="reviews-view" hidden></div>
</main>

<dialog id="dlg"><div class="dlg-h"><div id="dlg-title"></div>
  <button class="x" onclick="document.getElementById('dlg').close()">close</button></div>
  <div class="dlg-b" id="dlg-body"></div></dialog>

<script type="application/json" id="data">__DATA__</script>
<script type="application/json" id="transcripts">__TRANSCRIPTS__</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
// When exported, transcripts are embedded here; when served, they are fetched.
const TRANSCRIPTS = JSON.parse(document.getElementById('transcripts').textContent);
const SERVED = location.protocol.indexOf('http') === 0;
const el = (t, c, h) => { const e=document.createElement(t); if(c)e.className=c;
  if(h!==undefined)e.innerHTML=h; return e; };
const esc = s => (s||'').replace(/[&<>"]/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const sevClass = s => 'pill sev-'+s;
function openTranscript(sid) {
  const url = TRANSCRIPTS[sid]
    ? URL.createObjectURL(new Blob([TRANSCRIPTS[sid]], {type:'text/html'}))
    : 'transcripts/' + encodeURIComponent(sid) + '.html';
  window.open(url, '_blank', 'noopener');
}
const tlink = sess => (sess.has_transcript || TRANSCRIPTS[sess.id])
  ? `<a href="javascript:void(0)" onclick="openTranscript('${esc(sess.id)}')">${esc(sess.title||sess.id)}</a>`
  : `<span class="mut">${esc(sess.title||sess.id)}</span>`;

// ---- header ----
const st = DATA.stats;
document.getElementById('coverage').textContent =
  `${st.sessions_reviewed} of ${st.sessions_total} discovered sessions reviewed · `
  + `${st.findings_total} findings across ${st.reviews_total} reviews`
  + (st.current_version ? ` · jutul-agent v${st.current_version}` : '');
const cards = [
  ['Open issues', st.issues_open], ['Possibly fixed', st.issues_stale || 0],
  ['Reviews', st.reviews_total], ['Sessions reviewed', st.sessions_reviewed],
];
const cwrap = document.getElementById('cards');
cards.forEach(([l,n]) => { const c=el('div','card'); c.append(el('div','n',n),el('div','l',l));
  cwrap.append(c); });

function breakdown(title, rows, onClick) {
  const g = el('div','bargroup'); g.append(el('h3',null,title));
  const max = Math.max(1, ...rows.map(r=>r.count));
  rows.forEach(r => {
    const b = el('div','bar');
    b.append(el('span','name',esc(r.name)));
    const t = el('div','track'); const f=el('div','fill'); f.style.width=(100*r.count/max)+'%';
    t.append(f); b.append(t); b.append(el('span','c tnum',r.count));
    b.onclick = () => onClick(r.name);
    g.append(b);
  });
  return g;
}
const bd = document.getElementById('breakdowns');
bd.append(breakdown('By fix target', st.by_fix_target, v=>{filters.fix=v; syncControls(); render();}));
bd.append(breakdown('By severity', st.by_severity, v=>{filters.sev=v; syncControls(); render();}));
bd.append(breakdown('By category', st.by_category, v=>{filters.cat=v; syncControls(); render();}));
if ((st.by_simulator||[]).length)
  bd.append(breakdown('By simulator (findings)', st.by_simulator,
    ()=>{ document.querySelector('nav.tabs button[data-tab=reviews]').click(); }));

// ---- filters ----
const filters = {q:'', fix:'', cat:'', sev:'', status:'open', stale:false, from:'', to:''};
const uniq = k => [...new Set(DATA.issues.map(i=>i[k]))].sort();
const fill = (id, vals) => { const s=document.getElementById(id);
  vals.forEach(v => s.append(new Option(v, v))); };
fill('f-fix', uniq('fix_target')); fill('f-cat', uniq('category'));
fill('f-sev', ['high','medium','low']);
function syncControls(){ q.value=filters.q; document.getElementById('f-fix').value=filters.fix;
  document.getElementById('f-cat').value=filters.cat; document.getElementById('f-sev').value=filters.sev;
  document.getElementById('f-status').value=filters.status; }
const q = document.getElementById('q');
q.oninput = () => { filters.q=q.value.toLowerCase(); render(); };
const bind = (id,key) => document.getElementById(id).onchange =
  e => { filters[key]=e.target.value; render(); };
bind('f-fix','fix'); bind('f-cat','cat'); bind('f-sev','sev'); bind('f-status','status');
document.getElementById('f-stale').onchange = e => { filters.stale=e.target.checked; render(); };
document.getElementById('f-from').onchange = e => { filters.from=e.target.value; render(); };
document.getElementById('f-to').onchange = e => { filters.to=e.target.value; render(); };

// ---- sorting ----
let sort = {k:'priority', dir:-1};
const sevRank = {high:2, medium:1, low:0};
const keyval = (r,k) => k==='severity' ? sevRank[r.severity]
  : k==='nsess' ? r.sessions.length : r[k];
document.querySelectorAll('#issues-table th').forEach(th =>
  th.onclick = () => { const k=th.dataset.k;
    sort = {k, dir: sort.k===k ? -sort.dir : -1}; render(); });

// ---- render issues ----
function filtered() {
  return DATA.issues.filter(i =>
    (!filters.status || i.status===filters.status) &&
    (!filters.stale || i.stale) &&
    (!filters.fix || i.fix_target===filters.fix) &&
    (!filters.cat || i.category===filters.cat) &&
    (!filters.sev || i.severity===filters.sev) &&
    (!filters.q || (i.title+' '+i.examples.join(' ')).toLowerCase().includes(filters.q)) &&
    (!filters.from || (i.last_session||'').slice(0,10) >= filters.from) &&
    (!filters.to || (!!i.last_session && i.last_session.slice(0,10) <= filters.to))
  ).sort((a,b) => {
    const x=keyval(a,sort.k), y=keyval(b,sort.k);
    if (x<y) return -sort.dir; if (x>y) return sort.dir;
    return b.count-a.count;
  });
}
function render() {
  const rows = filtered();
  const tb = document.querySelector('#issues-table tbody'); tb.innerHTML='';
  document.getElementById('issues-empty').hidden = rows.length>0;
  rows.forEach(i => {
    const tr = el('tr');
    const stale = i.stale ? ` <span class="pill stale" title="last seen on ${esc(i.last_version)}, not since">possibly fixed</span>` : '';
    tr.innerHTML =
      `<td class="tnum" style="font-weight:600">${i.priority}</td>`+
      `<td><span class="${sevClass(i.severity)}">${i.severity}</span></td>`+
      `<td>${esc(i.title)}${stale}</td>`+
      `<td class="tnum">${i.count}×</td>`+
      `<td class="tnum">${i.sessions.length}</td>`+
      `<td class="mut">${esc(i.category)}</td>`+
      `<td>${esc(i.fix_target)}</td>`+
      `<td><span class="pill status-${i.status}">${i.status}</span></td>`+
      `<td class="mut tnum">${esc((i.last_session||'').slice(0,10))}</td>`;
    tr.onclick = () => openIssue(i);
    tb.append(tr);
  });
}
// Served, the page changes the store directly; exported (a file) it can only show
// the command to run.
async function doAction(action, id) {
  try {
    const r = await fetch('api/action', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({action, id})});
    if (r.ok) { location.reload(); return; }
  } catch (e) {}
  alert('action failed - is the server still running?');
}
async function showFix(id) {
  const r = await fetch('api/fix?id=' + encodeURIComponent(id));
  const text = await r.text();
  document.getElementById('dlg-title').innerHTML = '<div style="font-weight:650">Fix prompt</div>';
  const b = document.getElementById('dlg-body'); b.innerHTML = '';
  const copy = el('button','x','copy'); copy.style.marginBottom='8px';
  copy.onclick = () => navigator.clipboard.writeText(text).then(
    () => { copy.textContent='copied'; setTimeout(()=>copy.textContent='copy',1200); });
  b.append(copy, el('div','ev', esc(text)));
  document.getElementById('dlg').showModal();
}
function copyBtn(text) {
  const btn = el('button','x','copy');
  btn.onclick = () => navigator.clipboard.writeText(text).then(
    () => { btn.textContent='copied'; setTimeout(()=>btn.textContent='copy',1200); });
  return btn;
}
function actionRow(label, verb, id, note) {
  const row = el('div','cmd');
  const head = el('div','cmd-h'); head.append(el('span','cmd-l',label));
  if (SERVED && verb === 'fix') {
    const btn = el('button','x','show'); btn.onclick = () => showFix(id);
    head.append(btn); row.append(head);
  } else if (SERVED) {
    const btn = el('button','x', verb); btn.onclick = () => doAction(verb, id);
    head.append(btn); row.append(head);
  } else {
    const cmd = `jutul-agent review ${verb} ${id}`;
    head.append(copyBtn(cmd)); row.append(head, el('code', null, esc(cmd)));
  }
  if (note) row.append(el('div','mut',note));
  return row;
}
function openIssue(i) {
  const staleNote = i.stale
    ? ` · <span class="pill stale">possibly fixed</span> last on ${esc(i.last_version)}` : '';
  const span = (i.first_session && i.last_session)
    ? ` · sessions ${esc(i.first_session.slice(0,10))}→${esc(i.last_session.slice(0,10))}` : '';
  document.getElementById('dlg-title').innerHTML =
    `<div><div style="font-weight:650">${esc(i.title)}</div>`+
    `<div class="mut" style="margin-top:4px">`+
    `<span class="${sevClass(i.severity)}">${i.severity}</span> · ${esc(i.category)} · `+
    `fix: ${esc(i.fix_target)} · seen ${i.count}× in ${i.sessions.length} session(s)${span}${staleNote}</div></div>`;
  const b = document.getElementById('dlg-body'); b.innerHTML='';

  b.append(el('h4',null, SERVED ? 'Actions' : 'Actions (copy & run)'));
  b.append(actionRow('Generate a fix prompt for a coding agent', 'fix', i.id,
    'Prints a brief (evidence + where the fix belongs) to paste into Claude Code.'));
  b.append(actionRow('Mark fixed', 'resolve', i.id));
  b.append(actionRow('Dismiss (not worth fixing)', 'dismiss', i.id));
  b.append(actionRow('Delete from the store', 'delete', i.id));

  b.append(el('h4',null,'Sessions'));
  const ul = el('ul');
  i.sessions.slice().sort((a,b)=>(b.started||'').localeCompare(a.started||''))
    .forEach(s => { const li=el('li');
      const d = s.started ? `<span class="mut tnum">${esc(s.started.slice(0,10))}</span> ` : '';
      li.innerHTML = d + tlink(s); ul.append(li); });
  b.append(i.sessions.length ? ul : el('div','mut','—'));
  b.append(el('h4',null,'Evidence'));
  i.examples.forEach(ex => b.append(el('div','ev',esc(ex))));
  if (!i.examples.length) b.append(el('div','mut','—'));
  document.getElementById('dlg').showModal();
}

// ---- reviews view ----
function renderReviews() {
  const v = document.getElementById('reviews-view'); v.innerHTML='';
  if (!DATA.reviews.length) { v.append(el('div','empty','No reviews logged yet.')); return; }
  DATA.reviews.forEach(r => {
    const card = el('div','bargroup'); card.style.marginBottom='12px';
    const meta = [r.simulator, r.app_version && ('v'+r.app_version), r.model]
      .filter(Boolean).map(esc).join(' · ');
    const evalBadge = r.eval
      ? ` <span class="pill eval-${r.eval.toLowerCase()}">${r.eval}</span>` : '';
    card.innerHTML = `<div style="display:flex;justify-content:space-between;gap:12px">`+
      `<div style="font-weight:600">${tlink(r.session)}${evalBadge}</div>`+
      `<div class="mut tnum">${esc((r.created_at||'').slice(0,16).replace('T',' '))} · ${meta}</div></div>`+
      (r.summary?`<div class="mut" style="margin:6px 0">${esc(r.summary)}</div>`:'');
    r.findings.slice().sort((a,b)=>sevRank[b.severity]-sevRank[a.severity]).forEach(f => {
      const fd = el('div','finding');
      fd.innerHTML = `<div class="ft"><span class="${sevClass(f.severity)}">${f.severity}</span> `+
        `${esc(f.title)} <span class="mut">→ ${esc(f.fix_target)}</span></div>`+
        (f.evidence?`<div class="ev" style="margin-top:6px">${esc(f.evidence)}</div>`:'')+
        (f.suggestion?`<div style="margin-top:6px"><span class="mut">fix:</span> ${esc(f.suggestion)}</div>`:'')+
        (f.detail?`<div class="mut" style="margin-top:6px">${esc(f.detail)}</div>`:'');
      card.append(fd);
    });
    if (!r.findings.length) card.append(el('div','mut','clean — no findings'));
    v.append(card);
  });
}

// ---- tabs ----
document.querySelectorAll('nav.tabs button').forEach(btn =>
  btn.onclick = () => {
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const t = btn.dataset.tab;
    document.getElementById('issues-view').hidden = t!=='issues';
    document.getElementById('reviews-view').hidden = t!=='reviews';
  });

render(); renderReviews();

// Deep-link: #issue=<id> opens that issue's detail (used by the dashboard's own
// links and handy for sharing a pointer to one issue).
function openFromHash() {
  const m = (location.hash||'').match(/^#issue=(.+)$/);
  if (!m) return;
  const i = DATA.issues.find(x => x.id === decodeURIComponent(m[1]));
  if (i) openIssue(i);
}
window.addEventListener('hashchange', openFromHash);
openFromHash();
</script>
</body>
</html>
