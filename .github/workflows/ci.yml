name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  test:
    name: test (${{ matrix.os }})
    strategy:
      # Report every OS even if one fails, so a Windows-only break doesn't
      # mask a macOS-only one.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # The `integration` tests need a live Julia env (AgentREPL.jl, and for the
      # plot tests JutulDarcy/BattMo/CairoMakie precompiled). That's too heavy
      # for the cross-OS lane and isn't provisioned here, so skip it. The
      # `julia-integration` job below covers the AgentREPL backend on Linux.
      - name: Test
        run: uv run pytest -m "not integration"

  # Lightweight Julia coverage: exercises the Python <-> AgentREPL.jl MCP
  # backend against the bare `agentrepl_env`. Deliberately does not instantiate
  # the simulator envs to avoid spending a lot of time precompiling, so the CairoMakie
  # plot integration tests are local-only.
  julia-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      # Registry.update() also bootstraps the General registry on a fresh runner
      # depot (Pkg.resolve assumes it already exists and fails); then instantiate
      # resolves from Project + [sources].
      - name: Instantiate AgentREPL env
        run: >
          julia --project=src/jutul_agent/julia/agentrepl_env --startup-file=no
          -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'

      - name: Test (AgentREPL backend)
        run: uv run pytest tests/test_julia_session.py
