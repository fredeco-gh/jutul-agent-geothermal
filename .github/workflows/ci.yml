name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  test:
    name: test (${{ matrix.os }})
    strategy:
      # Report every OS even if one fails, so a Windows-only break doesn't
      # mask a macOS-only one.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      # The `integration` tests need a live Julia runtime (and, for the plot
      # tests, a GLMakie-instantiated JutulDarcy env). That's too heavy for the
      # cross-OS lane and isn't provisioned here, so skip it. The
      # `julia-integration` and `plot-integration` jobs cover them on Linux.
      - name: Test
        run: uv run pytest -m "not integration"

  # Lightweight Julia coverage: exercises the JuliaKernel backend (framed control
  # protocol, live streaming, SIGINT interrupt, reset) against base Julia — no
  # instantiated env needed. The heavier plot tests (which need a GLMakie-
  # instantiated simulator env) run in the `plot-integration` job below.
  julia-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Test (JuliaKernel backend)
        run: uv run pytest tests/test_juliakernel.py -v

  # Real plotting coverage: instantiate a GLMakie-enabled JutulDarcy env and run
  # the julia_plot integration tests (our capture/window/view machinery and the
  # native plotters, incl. the variable graph). Heavy on a cold cache; the Julia
  # artifact cache makes reruns cheaper. The BattMo plot test skips here (its env
  # isn't instantiated) — JutulDarcy is the meaningful native-plotter coverage.
  plot-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      # GLMakie needs an OpenGL context; the runner is headless, so provide a
      # virtual X server (xvfb) plus Mesa software GL. The plot tests start their
      # own Xvfb (via the managed_display fixture, as the runtime does); the
      # precompile below is wrapped in xvfb-run.
      - name: Install headless OpenGL (xvfb + Mesa)
        run: sudo apt-get update && sudo apt-get install -y xvfb xorg-dev mesa-utils libgl1 libgl1-mesa-dri

      # Sync the shared JutulAgent package into the template (it lives once in
      # julia_runtime/ and is copied in at bootstrap; an in-place instantiate must
      # do the same so the env's relative [sources] resolves). Then Registry.update()
      # bootstraps the General registry on a fresh depot and instantiate resolves
      # JutulDarcy + GLMakie + the GraphMakie stack. Wrapped in xvfb-run so GLMakie
      # can precompile with a GL context.
      - name: Instantiate JutulDarcy env
        run: >
          uv run python -c "from pathlib import Path; from jutul_agent.workspace import
          sync_shared_julia_package as s;
          s(Path('src/jutul_agent/simulators/jutuldarcy/julia_env'))" &&
          xvfb-run -a julia
          --project=src/jutul_agent/simulators/jutuldarcy/julia_env --startup-file=no
          -e 'using Pkg; Pkg.Registry.update(); Pkg.instantiate()'

      - name: Test (plot integration)
        run: uv run pytest tests/integration/test_julia_plot_integration.py -v
