name: Release

# Publishing is driven by GitHub Releases: cut a release tagged `vX.Y.Z` and this
# builds the sdist + wheel and uploads them to PyPI. hatch-vcs derives the package
# version from that tag, so the tag is the single source of truth for the version.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Trusted publishing maps the OIDC token to this environment; name it `pypi`
    # in the PyPI publisher config too. Lets release protections live on GitHub.
    environment: pypi
    permissions:
      # Mint the OIDC token uv exchanges with PyPI for a short-lived upload
      # credential, so no API token is stored in the repo.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs reads the version from the git tag, so the tag history must
          # be present; a shallow clone has none and would yield a dev version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist and wheel
        run: uv build

      # Catch a release made off the wrong ref: the built version must equal the
      # release tag, or we would ship a `0.1.devN` artifact under a clean release.
      - name: Verify built version matches the release tag
        run: |
          built=$(basename dist/jutul_agent-*-py3-none-any.whl | cut -d- -f2)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$built" != "$tag" ]; then
            echo "Built version '$built' does not match release tag '$tag'." >&2
            exit 1
          fi

      # No credentials passed: with `id-token: write` set, uv uses trusted
      # publishing automatically (its default --trusted-publishing mode).
      - name: Publish to PyPI
        run: uv publish
